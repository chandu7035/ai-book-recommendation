<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AI Book Recommendation
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    background:
    radial-gradient(
        circle at top left,
        #7c3aed,
        transparent 30%
    ),
    radial-gradient(
        circle at bottom right,
        #2563eb,
        transparent 30%
    ),
    #050816;

    overflow-x:hidden;

    padding:40px;
}

/* MAIN CONTAINER */

.container{

    max-width:1400px;

    margin:auto;
}

/* GLASS CARD */

.main-card{

    background:rgba(
        255,
        255,
        255,
        0.06
    );

    border:1px solid rgba(
        255,
        255,
        255,
        0.12
    );

    backdrop-filter:blur(25px);

    border-radius:35px;

    padding:50px;

    box-shadow:
    0 20px 60px rgba(
        0,
        0,
        0,
        0.55
    );
}

/* HEADER */

.logo{

    text-align:center;

    font-size:70px;

    margin-bottom:20px;
}

h1{

    text-align:center;

    font-size:58px;

    font-weight:800;

    margin-bottom:20px;

    background:
    linear-gradient(
        135deg,
        #ffffff,
        #c084fc,
        #60a5fa
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    text-align:center;

    color:#cbd5e1;

    font-size:18px;

    margin-bottom:45px;
}

/* SEARCH */

.search-wrapper{

    display:flex;

    gap:20px;

    margin-bottom:55px;
}

.search-box{

    flex:1;

    position:relative;
}

.search-box input{

    width:100%;

    padding:24px 24px 24px 65px;

    border:none;

    outline:none;

    border-radius:22px;

    background:rgba(
        255,
        255,
        255,
        0.08
    );

    border:2px solid rgba(
        192,
        132,
        252,
        0.35
    );

    color:white;

    font-size:18px;

    transition:0.3s;
}

.search-box input:focus{

    transform:scale(1.02);

    border-color:#c084fc;

    box-shadow:
    0 0 20px rgba(
        192,
        132,
        252,
        0.4
    );
}

.search-box input::placeholder{

    color:#cbd5e1;
}

.search-icon{

    position:absolute;

    left:22px;

    top:50%;

    transform:translateY(-50%);

    color:#cbd5e1;

    font-size:24px;
}

/* BUTTON */

button{

    padding:24px 38px;

    border:none;

    border-radius:22px;

    background:
    linear-gradient(
        135deg,
        #3b82f6,
        #8b5cf6
    );

    color:white;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 10px 30px rgba(
        139,
        92,
        246,
        0.45
    );
}

button:hover{

    transform:
    translateY(-4px)
    scale(1.03);
}

/* RESULTS */

.result-container{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(250px,1fr)
    );

    gap:30px;
}

/* BOOK CARD */

.book-card{

    background:rgba(
        255,
        255,
        255,
        0.07
    );

    border:1px solid rgba(
        255,
        255,
        255,
        0.1
    );

    border-radius:28px;

    padding:28px;

    position:relative;

    overflow:hidden;

    transition:0.35s;

    min-height:280px;
}

.book-card::before{

    content:"";

    position:absolute;

    width:200px;

    height:200px;

    background:#8b5cf6;

    border-radius:50%;

    filter:blur(110px);

    top:-80px;

    right:-80px;

    opacity:0.22;
}

.book-card:hover{

    transform:
    translateY(-8px)
    scale(1.02);

    border-color:rgba(
        192,
        132,
        252,
        0.45
    );

    box-shadow:
    0 20px 40px rgba(
        0,
        0,
        0,
        0.45
    );
}

/* BOOK ICON */

.book-icon{

    width:80px;

    height:100px;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #7c3aed,
        #3b82f6
    );

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:36px;

    margin-bottom:25px;

    box-shadow:
    0 10px 25px rgba(
        124,
        58,
        237,
        0.45
    );
}

/* TITLE */

.book-title{

    color:white;

    font-size:25px;

    font-weight:700;

    line-height:1.5;

    margin-bottom:18px;

    position:relative;

    z-index:2;
}

/* AUTHOR */

.book-author{

    color:#cbd5e1;

    font-size:15px;

    margin-bottom:18px;

    position:relative;

    z-index:2;
}

/* RATING */

.rating{

    display:inline-block;

    padding:10px 16px;

    border-radius:14px;

    background:rgba(
        34,
        197,
        94,
        0.16
    );

    color:#4ade80;

    font-size:14px;

    font-weight:700;

    position:relative;

    z-index:2;
}

/* LOADING */

.loading{

    text-align:center;

    color:white;

    font-size:20px;

    margin-bottom:25px;

    animation:blink 1s infinite;
}

@keyframes blink{

    0%{
        opacity:0.4;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.4;
    }
}

/* MOBILE */

@media(max-width:768px){

    .search-wrapper{

        flex-direction:column;
    }

    button{

        width:100%;
    }

    h1{

        font-size:42px;
    }

    .main-card{

        padding:30px;
    }
}

</style>

</head>

<body>

<div class="container">

<div class="main-card">

<div class="logo">
📚
</div>

<h1>
AI Book Recommendation
</h1>

<p class="subtitle">

Discover books similar to your favorite reads
using Machine Learning and Artificial Intelligence

</p>

<div class="search-wrapper">

<div class="search-box">

<div class="search-icon">
🔍
</div>

<input
type="text"
id="book"
placeholder="Search your favorite book...">

</div>

<button onclick="recommendBook()">

✨ Recommend Books

</button>

</div>

<div id="loading"></div>

<div
class="result-container"
id="result">

</div>

</div>

</div>

<script>

async function recommendBook(){

    const book = document.getElementById(
        "book"
    ).value

    if(book.trim()===""){

        return
    }

    document.getElementById(
        "loading"
    ).innerHTML = `

    <div class="loading">

    Finding magical recommendations...

    </div>
    `

    document.getElementById(
        "result"
    ).innerHTML = ""

    const response = await fetch(

        "/recommend",

        {

            method:"POST",

            headers:{

                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                book:book
            })
        }
    )

    const result = await response.json()

    document.getElementById(
        "loading"
    ).innerHTML = ""

    let html = ""

    if(result.recommendations){

        result.recommendations.forEach(

            function(book){

                html += `

                <div class="book-card">

                    <div class="book-icon">

                        📖

                    </div>

                    <div class="book-title">

                        ${book.title}

                    </div>

                    <div class="book-author">

                        ✍️ ${book.author}

                    </div>

                    <div class="rating">

                        ⭐ Rating:
                        ${book.rating}

                    </div>

                </div>
                `
            }
        )
    }

    else{

        html = `

        <div style="
        color:white;
        text-align:center;
        font-size:20px;
        ">

        ${result.error}

        </div>
        `
    }

    document.getElementById(
        "result"
    ).innerHTML = html
}

</script>

</body>
</html>
